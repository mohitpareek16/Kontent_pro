<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Edit Time Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0f11; --surface: #16181c; --surface2: #1e2128;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #f0f0ee; --muted: #808080;
    --accent: #4f8ef7; --accent-dim: rgba(79,142,247,0.12);
    --green: #3ecf8e; --green-dim: rgba(62,207,142,0.12);
    --amber: #f5a623; --amber-dim: rgba(245,166,35,0.12);
    --red: #e05c5c; --red-dim: rgba(224,92,92,0.12);
    --radius: 10px; --radius-lg: 14px;
    --font: 'Sora', sans-serif; --mono: 'DM Mono', monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 860px; margin: 0 auto; }

  .setup-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; gap: 1.5rem; }
  .setup-icon { width: 64px; height: 64px; border-radius: 16px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; }
  .setup-title { font-size: 24px; font-weight: 600; letter-spacing: -0.02em; }
  .setup-sub { font-size: 14px; color: var(--muted); line-height: 1.7; max-width: 340px; }
  .setup-form { display: flex; gap: 8px; width: 100%; max-width: 360px; }
  .setup-form input { flex: 1; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; }
  .setup-form input:focus { border-color: var(--accent); }

  button { font-family: var(--font); font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius); padding: 8px 16px; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #3b7de8; }
  .btn-green { background: var(--green); color: #0a2416; }
  .btn-green:hover { background: #30bf7d; }
  .btn-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(245,166,35,0.25); }
  .btn-amber:hover { background: rgba(245,166,35,0.22); }
  .btn-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,92,92,0.25); }
  .btn-red:hover { background: rgba(224,92,92,0.22); }
  .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 7px; }
  .btn-danger-outline { background: transparent; border: 1px solid rgba(224,92,92,0.3); color: var(--red); font-size: 12px; padding: 6px 12px; }
  .btn-danger-outline:hover { background: var(--red-dim); }

  /* ── Lunch Break Popup ── */
  .lunch-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: center; justify-content: center; z-index: 999; backdrop-filter: blur(6px); animation: fadeInOverlay 0.3s ease; }
  @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
  .lunch-popup { background: var(--surface); border: 1px solid rgba(245,166,35,0.35); border-radius: 18px; padding: 2rem 2rem 1.75rem; width: 400px; max-width: 92vw; text-align: center; box-shadow: 0 0 0 1px rgba(245,166,35,0.1), 0 24px 64px rgba(0,0,0,0.6); animation: popupIn 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popupIn { from { opacity: 0; transform: scale(0.88) translateY(12px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .lunch-icon-wrap { width: 72px; height: 72px; border-radius: 50%; background: var(--amber-dim); border: 2px solid rgba(245,166,35,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; font-size: 34px; }
  .lunch-title { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; color: var(--amber); margin-bottom: 0.5rem; }
  .lunch-subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 1.5rem; }
  .lunch-time-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--amber-dim); border: 1px solid rgba(245,166,35,0.3); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-family: var(--mono); color: var(--amber); margin-bottom: 1.75rem; }
  .lunch-popup-btns { display: flex; flex-direction: column; gap: 10px; }
  .btn-lunch-main { width: 100%; padding: 13px; font-size: 14px; font-weight: 600; background: var(--amber); color: #1a0e00; border-radius: var(--radius); border: none; cursor: pointer; font-family: var(--font); letter-spacing: 0.01em; transition: all 0.15s; }
  .btn-lunch-main:hover { background: #e8961f; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(245,166,35,0.35); }
  .btn-lunch-dismiss { width: 100%; padding: 10px; font-size: 13px; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .btn-lunch-dismiss:hover { color: var(--text); border-color: var(--border2); }

  .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
  .app-logo { display: flex; align-items: center; gap: 10px; }
  .app-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }
  .app-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .editor-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; font-size: 13px; font-weight: 500; }
  .editor-pill-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .sync-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid; }
  .sync-status.syncing { color: var(--amber); border-color: rgba(245,166,35,0.3); background: var(--amber-dim); }
  .sync-status.synced { color: var(--green); border-color: rgba(62,207,142,0.3); background: var(--green-dim); }
  .sync-status.error { color: var(--red); border-color: rgba(224,92,92,0.3); background: var(--red-dim); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-val { font-size: 20px; font-weight: 600; font-family: var(--mono); }
  .stat-val.green { color: var(--green); } .stat-val.amber { color: var(--amber); } .stat-val.blue { color: var(--accent); } .stat-val.small { font-size: 15px; }

  .videos-list { display: flex; flex-direction: column; gap: 12px; }
  .video-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: border-color 0.2s; }
  .video-card.running { border-color: rgba(62,207,142,0.35); box-shadow: 0 0 0 1px rgba(62,207,142,0.1); }
  .card-body { padding: 1rem 1.25rem; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.75rem; }
  .video-name { font-size: 15px; font-weight: 600; }
  .channel-badge { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 500; background: var(--surface2); color: var(--muted); border: 1px solid var(--border); margin-top: 4px; }
  .timer-block { text-align: right; }
  .timer { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--text); letter-spacing: 0.02em; line-height: 1; }
  .timer.running-color { color: var(--green); }
  .timer-meta { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.6; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 20px; margin-top: 4px; }
  .status-badge.running { background: var(--green-dim); color: var(--green); }
  .status-badge.paused { background: var(--amber-dim); color: var(--amber); }
  .status-badge.done { background: var(--accent-dim); color: var(--accent); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .status-dot.pulse { animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 1.25rem; border-top: 1px solid var(--border); background: var(--surface2); }

  .log-section { padding: 0 1.25rem 10px; background: var(--surface2); border-top: 1px solid var(--border); }
  .log-toggle { font-size: 12px; color: var(--muted); cursor: pointer; padding: 8px 0 4px; display: block; user-select: none; }
  .log-toggle:hover { color: var(--text); }
  .log-entries { display: flex; flex-direction: column; gap: 4px; padding-bottom: 4px; }
  .log-entry { font-size: 11px; font-family: var(--mono); color: var(--muted); padding: 5px 10px; background: var(--surface); border-radius: 6px; border-left: 2px solid var(--border2); }
  .log-entry.start { border-left-color: var(--green); }
  .log-entry.pause { border-left-color: var(--amber); }
  .log-entry.complete { border-left-color: var(--accent); }

  /* ── Comment Box ── */
  .comment-section { padding: 0 1.25rem 10px; background: var(--surface2); border-top: 1px solid var(--border); }
  .comment-toggle-row { display: flex; align-items: center; gap: 8px; padding: 8px 0 4px; cursor: pointer; user-select: none; }
  .comment-toggle-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); background: none; border: none; padding: 0; cursor: pointer; font-family: var(--font); transition: color 0.15s; }
  .comment-toggle-btn:hover { color: var(--accent); }
  .comment-has-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .comment-box-wrap { display: none; padding-bottom: 10px; }
  .comment-box-wrap.open { display: block; }
  .comment-textarea { width: 100%; padding: 9px 12px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; resize: none; outline: none; transition: border-color 0.15s; }
  .comment-textarea:focus { border-color: var(--accent); }
  .comment-textarea::placeholder { color: var(--muted); }
  .comment-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
  .comment-char-count { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .comment-char-count.warn { color: var(--amber); }
  .comment-char-count.over { color: var(--red); }
  .comment-save-btn { padding: 5px 14px; font-size: 12px; font-weight: 600; background: var(--accent); color: #fff; border: none; border-radius: 7px; cursor: pointer; font-family: var(--font); transition: all 0.15s; }
  .comment-save-btn:hover { background: #3b7de8; }
  .comment-saved-note { font-size: 11px; color: var(--green); display: none; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 200; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 1.5rem; width: 380px; max-width: 90vw; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; }
  .form-row { margin-bottom: 14px; }
  .form-row label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .form-row input, .form-row select { width: 100%; padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 14px; outline: none; }
  .form-row input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
  .reset-warning { background: var(--red-dim); border: 1px solid rgba(224,92,92,0.25); border-radius: var(--radius); padding: 10px 12px; font-size: 13px; color: var(--red); margin-bottom: 1rem; line-height: 1.6; }
  .empty-state { text-align: center; padding: 4rem 1rem; color: var(--muted); font-size: 14px; line-height: 1.8; }
  .empty-icon { font-size: 36px; margin-bottom: 0.75rem; opacity: 0.5; }
  .setup-brand { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.55); white-space: nowrap; }
  .header-brand { font-family: var(--mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 2px; }

  .search-filter-bar { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.45; }
  .search-input { width: 100%; padding: 9px 12px 9px 36px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 13px; outline: none; transition: border-color 0.15s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }
  .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .date-input-wrap { position: relative; display: flex; align-items: center; }
  .date-label { font-size: 11px; color: var(--muted); margin-right: 5px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .date-input { padding: 8px 10px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px; outline: none; transition: border-color 0.15s; cursor: pointer; }
  .date-input:focus { border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; }
  .filter-clear { font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; cursor: pointer; white-space: nowrap; }
  .filter-clear:hover { color: var(--red); border-color: rgba(224,92,92,0.3); }
  .filter-results { font-size: 12px; color: var(--muted); padding: 4px 0; white-space: nowrap; }
  .filter-results strong { color: var(--accent); }

  /* ── Attendance Bar ── */
  .attendance-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-lg); padding: 12px 18px; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
  .attendance-info { display: flex; flex-direction: column; gap: 3px; }
  .attendance-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .attendance-time { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .attendance-status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .attendance-status-pill.in { background: var(--green-dim); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
  .attendance-status-pill.out { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,92,92,0.25); }
  .attendance-status-pill.idle { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .att-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
  .btn-login-office { padding: 9px 22px; font-size: 13px; font-weight: 600; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.18s; font-family: var(--font); letter-spacing: 0.01em; }
  .btn-login-office.login-state { background: var(--green); color: #0a2416; }
  .btn-login-office.login-state:hover { background: #30bf7d; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(62,207,142,0.3); }
  .btn-login-office.logout-state { background: var(--red-dim); color: var(--red); border: 1px solid rgba(224,92,92,0.3); }
  .btn-login-office.logout-state:hover { background: rgba(224,92,92,0.22); transform: translateY(-1px); }
</style>

<body>
<div class="container">
  <div id="root"></div>
  <div id="modal-root"></div>
</div>
<script>
const STORE = 'vett_v3';
const S = { editor: null, videos: [], ticks: {}, syncTimeout: null, fbListener: null };
let authUnsubscribe = null;

// ── Attendance Helpers ──
function getAttendance() {
  try { return JSON.parse(localStorage.getItem('vett_attendance_' + (S.editor?.id || '')) || 'null'); } catch(e) { return null; }
}
function saveAttendance(data) {
  try { localStorage.setItem('vett_attendance_' + S.editor.id, JSON.stringify(data)); } catch(e) {}
}
function pushAttendanceToFirebase(attData) {
  if (!window._fbReady || !S.editor) return;
  try {
    const attRef = window._fbRef(window._fbDb, 'attendance/' + S.editor.id);
    window._fbSet(attRef, { editorId: S.editor.id, editorName: S.editor.name, ...attData });
  } catch(e) {}
}
function doOfficeLogin() {
  const att = getAttendance() || { logs: [] };
  const now = Date.now();
  att.status = 'in';
  att.loginTime = now;
  att.logs = att.logs || [];
  att.logs.push({ type: 'login', ts: now });
  saveAttendance(att);
  pushAttendanceToFirebase(att);
  renderAttendanceBar();
}
function doOfficeLogout() {
  const att = getAttendance() || { logs: [] };
  const now = Date.now();
  att.status = 'out';
  att.logoutTime = now;
  att.logs = att.logs || [];
  att.logs.push({ type: 'logout', ts: now });
  saveAttendance(att);
  pushAttendanceToFirebase(att);
  renderAttendanceBar();
}
function renderAttendanceBar() {
  const bar = document.getElementById('attendance-bar');
  if (!bar) return;
  const att = getAttendance();
  const status = att?.status || 'idle';
  const loginTime = att?.loginTime ? fmtDT(att.loginTime) : '—';
  const logoutTime = att?.logoutTime ? fmtDT(att.logoutTime) : '—';
  const isIn = status === 'in';
  const pillHtml = isIn
    ? `<span class="attendance-status-pill in"><span class="att-dot"></span>Office mein hain</span>`
    : status === 'out'
    ? `<span class="attendance-status-pill out">Logged Out</span>`
    : `<span class="attendance-status-pill idle">Aaj login nahi kiya</span>`;
  const btnHtml = isIn
    ? `<button class="btn-login-office logout-state" onclick="doOfficeLogout()">⏻ Logout</button>`
    : `<button class="btn-login-office login-state" onclick="doOfficeLogin()">↩ Login</button>`;
  bar.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      ${pillHtml}
      <div class="attendance-info"><div class="attendance-label">Login</div><div class="attendance-time">${loginTime}</div></div>
      <div class="attendance-info"><div class="attendance-label">Logout</div><div class="attendance-time">${logoutTime}</div></div>
    </div>
    ${btnHtml}`;
}

// ── Local Storage ──
function saveLocal() {
  try { localStorage.setItem(STORE, JSON.stringify({ editor: S.editor, videos: S.videos })); } catch(e) {}
}
function loadLocal() {
  try { const d = JSON.parse(localStorage.getItem(STORE)||'{}'); S.editor = d.editor||null; S.videos = d.videos||[]; } catch(e) {}
}

// ── Firebase Sync ──
function setSyncStatus(state) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    syncing: ['syncing','⟳ Syncing...'],
    synced:  ['synced', '✓ Synced'],
    error:   ['error',  '✗ Sync Error']
  };
  const [cls, txt] = map[state] || map.synced;
  el.className = 'sync-status ' + cls;
  el.innerHTML = `<span class="sync-dot"></span>${txt}`;
}

function saveToFirebase() {
  if (!window._fbReady || !S.editor) return;
  setSyncStatus('syncing');
  clearTimeout(S.syncTimeout);
  S.syncTimeout = setTimeout(() => {
    try {
      const editorKey = S.editor.id;
      const dataRef = window._fbRef(window._fbDb, 'editors/' + editorKey);
      window._fbSet(dataRef, {
        editorId: S.editor.id,
        editorName: S.editor.name,
        lastSeen: Date.now(),
        videos: S.videos
      }).then(() => setSyncStatus('synced'))
        .catch(() => setSyncStatus('error'));
    } catch(e) { setSyncStatus('error'); }
  }, 800);
}

function save() {
  saveLocal();
  saveToFirebase();
}

// ── Helpers ──
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtMs(ms) { const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h>0?h+'h '+m+'m '+sc+'s':m+'m '+sc+'s'; }
function fmtDT(ts) { return ts ? new Date(ts).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'; }
function liveMs(v) { return (v.status==='running'&&v.sessionStart) ? v.totalMs+(Date.now()-v.sessionStart) : v.totalMs; }
function closeModal() { document.getElementById('modal-root').innerHTML=''; }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

// ── Auth & Setup Screen ──
function initAppAuth() {
  if (!window._fbReady) {
    document.addEventListener('firebase-ready', initAppAuth, { once: true });
    return;
  }
  
  document.getElementById('root').innerHTML = '<div class="setup-screen"><div class="setup-title">Checking Authentication...</div></div>';

  // Check for redirect result (errors during login)
  window._fbGetRedirectResult(window._fbAuth).catch(err => {
    console.error("Redirect Login Error:", err);
    if (err.code !== 'auth/redirect-cancelled-by-user') {
      alert("Login failed: " + err.message);
    }
  });

  if (authUnsubscribe) authUnsubscribe();
  authUnsubscribe = window._fbOnAuthStateChanged(window._fbAuth, async (user) => {
    if (user) {
      const uid = user.uid;
      const name = user.displayName || user.email.split('@')[0];
      const dbRef = window._fbRef(window._fbDb, 'editors/' + uid);
      try {
        const snapshot = await window._fbGet(dbRef);
        if (snapshot.exists()) {
          const data = snapshot.val();
          S.editor = { id: uid, name: name, email: user.email };
          S.videos = data.videos || [];
        } else {
          S.editor = { id: uid, name: name, email: user.email };
          S.videos = [];
        }
        saveLocal();
        renderApp();
      } catch (e) {
        console.error("Error fetching user data", e);
        loadLocal();
        if (S.editor && S.editor.id === uid) {
          renderApp();
        } else {
          S.editor = { id: uid, name: name, email: user.email };
          S.videos = [];
          saveLocal();
          renderApp();
        }
      }
    } else {
      Object.values(S.ticks).forEach(t=>clearInterval(t));
      S.ticks={}; S.editor=null; S.videos=[];
      renderSetup();
    }
  });
}

// ── Video Controls ──
function startVideo(vid) {
  const v=S.videos.find(x=>x.id===vid);
  const running=S.videos.find(x=>x.status==='running');
  if(running&&running.id!==vid) pauseVideo(running.id,'Auto-paused — switched to: '+v.channel);
  v.status='running'; v.sessionStart=Date.now();
  v.logs.push({type:'start',ts:Date.now(),note:'Editing started'});
  if(S.ticks[vid]) clearInterval(S.ticks[vid]);
  S.ticks[vid]=setInterval(()=>tickTimer(vid),1000);
  save(); renderVideos(); renderStats(); notifyPopups();
}

function pauseVideo(vid,note) {
  const v=S.videos.find(x=>x.id===vid);
  if(v.status!=='running') return;
  const el=Date.now()-v.sessionStart;
  v.totalMs+=el; v.sessionStart=null; v.status='paused';
  v.logs.push({type:'pause',ts:Date.now(),note:note||'Paused',elapsed:el});
  if(S.ticks[vid]){clearInterval(S.ticks[vid]);delete S.ticks[vid];}
  save(); renderVideos(); renderStats(); notifyPopups();
}

function lunchBreak(vid){ pauseVideo(vid,'Lunch break — 1:00 PM to 2:00 PM'); }

// ── Lunch Break Auto Reminder (Notification + Title Blink) ──
(function initLunchReminder() {
  let lunchShownDate = null;
  let titleBlinkInterval = null;
  const originalTitle = document.title;

  // ── Request notification permission on first user interaction ──
  function requestNotifPermission() {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }
  document.addEventListener('click', requestNotifPermission, { once: true });

  // ── Browser Notification ──
  function sendBrowserNotification() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'granted') {
      const notif = new Notification('🍽️ Lunch Break Time!', {
        body: "It's 1:00 PM — time to step away from your work.\nRest well, you've earned it! ☀️",
        icon: 'https://fonts.gstatic.com/s/i/short-term/release/materialsymbolsoutlined/lunch_dining/default/48px.png',
        tag: 'lunch-reminder',
        requireInteraction: true
      });
      // Clicking notification brings tracker tab into focus
      notif.onclick = function() {
        window.focus();
        notif.close();
        showLunchPopup();
      };
    } else if (Notification.permission !== 'denied') {
      Notification.requestPermission().then(perm => {
        if (perm === 'granted') sendBrowserNotification();
      });
    }
  }

  // ── Tab Title Blink ──
  function startTitleBlink() {
    if (titleBlinkInterval) return;
    let toggle = false;
    titleBlinkInterval = setInterval(() => {
      document.title = toggle ? '🍽️ LUNCH TIME! — Pause Your Work' : originalTitle;
      toggle = !toggle;
    }, 900);
  }

  function stopTitleBlink() {
    if (titleBlinkInterval) {
      clearInterval(titleBlinkInterval);
      titleBlinkInterval = null;
    }
    document.title = originalTitle;
  }

  // ── In-page Popup ──
  function showLunchPopup() {
    const existing = document.getElementById('lunch-popup-overlay');
    if (existing) return;
    const overlay = document.createElement('div');
    overlay.id = 'lunch-popup-overlay';
    overlay.className = 'lunch-overlay';
    overlay.innerHTML = `
      <div class="lunch-popup">
        <div class="lunch-icon-wrap">🍽️</div>
        <div class="lunch-title">Lunch Break Time!</div>
        <div class="lunch-subtitle">It's 1:00 PM — time to step away from the screen.<br>Rest well, you have earned it.</div>
        <div class="lunch-time-badge">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.2"/><polyline points="6,3 6,6 8,7.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Lunch: 1:00 PM – 2:00 PM
        </div>
        <div class="lunch-popup-btns">
          <button class="btn-lunch-main" onclick="takeLunchBreakAll()">🍽 Take Lunch Break &amp; Pause All</button>
          <button class="btn-lunch-dismiss" onclick="dismissLunchPopup()">I'll handle it myself — Dismiss</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
  }

  // ── Master trigger ──
  function triggerLunchReminder() {
    const today = new Date().toDateString();
    if (lunchShownDate === today) return;
    if (!S.editor) return;
    lunchShownDate = today;

    sendBrowserNotification(); // fires even when tab is in background
    startTitleBlink();         // tab title blinks when user is in another app
    showLunchPopup();          // in-page popup if tab is visible
  }

  function checkLunchTime() {
    const now = new Date();
    if (now.getHours() === 13 && now.getMinutes() === 0) {
      triggerLunchReminder();
    }
  }

  setInterval(checkLunchTime, 30000);
  checkLunchTime();

  // Expose stopTitleBlink so dismiss can call it
  window._stopLunchTitleBlink = stopTitleBlink;
})();

function takeLunchBreakAll() {
  S.videos.filter(v => v.status === 'running').forEach(v => lunchBreak(v.id));
  dismissLunchPopup();
}

function dismissLunchPopup() {
  if (window._stopLunchTitleBlink) window._stopLunchTitleBlink();
  const overlay = document.getElementById('lunch-popup-overlay');
  if (overlay) {
    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.2s';
    setTimeout(() => overlay.remove(), 220);
  }
}

function completeVideo(vid) {
  const v=S.videos.find(x=>x.id===vid);
  if(v.status==='running'){v.totalMs+=Date.now()-v.sessionStart;v.sessionStart=null;}
  v.status='done'; v.completedAt=Date.now();
  v.logs.push({type:'complete',ts:Date.now(),note:'Video completed'});
  if(S.ticks[vid]){clearInterval(S.ticks[vid]);delete S.ticks[vid];}
  save(); renderVideos(); renderStats(); notifyPopups();
}

function deleteVideo(vid) {
  if(!confirm('Delete this video record permanently?')) return;
  if(S.ticks[vid]){clearInterval(S.ticks[vid]);delete S.ticks[vid];}
  S.videos=S.videos.filter(x=>x.id!==vid);
  save(); renderVideos(); renderStats();
}

function tickTimer(vid) {
  const el=document.getElementById('t-'+vid), v=S.videos.find(x=>x.id===vid);
  if(el&&v) el.textContent=fmtMs(liveMs(v));
}

function toggleLog(vid) {
  const el=document.getElementById('log-'+vid);
  if(el) el.style.display=el.style.display==='none'?'flex':'none';
}

function toggleComment(vid) {
  const wrap = document.getElementById('comment-wrap-' + vid);
  if (!wrap) return;
  const isOpen = wrap.classList.contains('open');
  wrap.classList.toggle('open', !isOpen);
  if (!isOpen) {

}

function commentInput(vid) {
  const ta = document.getElementById('comment-ta-' + vid);
  const cc = document.getElementById('comment-cc-' + vid);
  if (!ta || !cc) return;
  const len = ta.value.length;
  cc.textContent = len + ' / 500 chars';
  cc.className = 'comment-char-count' + (len > 450 ? ' warn' : '') + (len > 500 ? ' over' : '');
}

function saveComment(vid) {
  const ta = document.getElementById('comment-ta-' + vid);
  if (!ta) return;
  const text = ta.value.trim().slice(0, 500);
  const v = S.videos.find(x => x.id === vid);
  if (!v) return;
  v.comment = text;
  save();
  // Update button indicator
  const btn = document.getElementById('comment-btn-' + vid);
  const dot = document.getElementById('comment-dot-' + vid);
  if (btn) btn.textContent = text ? '💬 Comment' : '💬 Add Comment';
  if (dot) dot.style.display = text ? 'inline-block' : 'none';
  // Show saved flash
  const saved = document.getElementById('comment-saved-' + vid);
  if (saved) { saved.style.display = 'inline'; setTimeout(() => { saved.style.display = 'none'; }, 2000); }
}

// ── Export Log (txt) ──
function downloadLog(vid) {
  const v=S.videos.find(x=>x.id===vid);
  if(!v) return;
  const sep='─'.repeat(52);
  const lines=[];
  lines.push('VIDEO EDIT TIME LOG');
  lines.push(sep);
  lines.push('Editor      : '+S.editor.name);
  lines.push('Video       : '+v.name);
  lines.push('Channel     : '+v.channel);
  lines.push('Status      : '+v.status.charAt(0).toUpperCase()+v.status.slice(1));
  lines.push('Total Time  : '+fmtMs(liveMs(v)));
  lines.push('Generated   : '+fmtDT(Date.now()));
  lines.push(sep);
  lines.push('ACTIVITY LOG');
  lines.push(sep);
  if(!v.logs.length){ lines.push('No activity recorded yet.'); }
  else { v.logs.forEach((l,i)=>{ const icon=l.type==='start'?'▶':l.type==='pause'?'⏸':l.type==='complete'?'✓':'•'; lines.push((i+1)+'. '+icon+' ['+fmtDT(l.ts)+']'); lines.push('   '+l.note+(l.elapsed?' (Session: '+fmtMs(l.elapsed)+')':'')); }); }
  lines.push(sep);
  lines.push('Total Time Worked: '+fmtMs(liveMs(v)));
  if(v.completedAt) lines.push('Completed On     : '+fmtDT(v.completedAt));
  lines.push(sep);
  const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const safeName=(v.name+'-'+v.channel).replace(/[^a-zA-Z0-9_-]/g,'_');
  a.href=url; a.download='Log_'+safeName+'_'+S.editor.name.replace(/\s+/g,'_')+'.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

    ws[XLSX.utils.encode_cell({r:R,c:4})] = cell('Started: '+(startLog?fmtDT(startLog.ts):'—'),false,'808080','1E2128','left');
    ws[XLSX.utils.encode_cell({r:R,c:5})] = cell(v.completedAt?'Completed: '+fmtDT(v.completedAt):'',false,'808080','1E2128','left');
    ws[XLSX.utils.encode_cell({r:R,c:6})] = ec('1E2128'); ws[XLSX.utils.encode_cell({r:R,c:7})] = ec('1E2128'); R++;
    if(!v.logs.length){
      ws[XLSX.utils.encode_cell({r:R,c:0})] = cell('No activity recorded yet.',false,'808080','111318','left');
      for(let i=1;i<8;i++) ws[XLSX.utils.encode_cell({r:R,c:i})] = ec('111318');
      mergeRow(R,0,7); R++;
    } else {
      setRow(['#','Activity Type','Date & Time','Description','Session Duration','','',''].map((h,i)=> h ? cell(h,true,'FFFFFF','1C2E1A','center') : ec('1C2E1A')));
      v.logs.forEach((l,i)=>{
        const bg = l.type==='start'?'0F2318': l.type==='pause'?'2A1F08': l.type==='complete'?'0C1D36': (i%2===0?'111318':'16181C');
        const tc = l.type==='start'?'3ECF8E': l.type==='pause'?'F5A623': l.type==='complete'?'4F8EF7':'F0F0EE';
        const label = l.type==='start'?'▶  Start': l.type==='pause'?'⏸  Pause': l.type==='complete'?'✓  Complete': l.type;
        setRow([ cell(i+1,false,'808080',bg,'center'), cell(label,true,tc,bg,'center'), cell(fmtDT(l.ts),false,'C0C0C0',bg,'center'), cell(l.note,false,'F0F0EE',bg,'left'), cell(l.elapsed?fmtMs(l.elapsed):'—',false,l.elapsed?'3ECF8E':'808080',bg,'center'), ec(bg), ec(bg), ec(bg), ], bg);
      });
    }
  });
  blankRow();
  ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:R,c:7}});
  ws['!cols'] = [{wch:4},{wch:26},{wch:16},{wch:13},{wch:22},{wch:22},{wch:16},{wch:14}];
  ws['!merges'] = merges;
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Edit Report');
  const date = new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}).replace(/ /g,'-');
  XLSX.writeFile(wb, 'KontentMedia_'+S.editor.name.replace(/\s+/g,'_')+'_'+date+'.xlsx');
}

  // Initial Firebase sync

function applyFilters() { renderVideos(); }

function clearFilters() {
  const si=document.getElementById('search-input');
  const ff=document.getElementById('filter-from');
  const ft=document.getElementById('filter-to');
  if(si) si.value=''; if(ff) ff.value=''; if(ft) ft.value='';
  renderVideos();
}

function getFilteredVideos() {
  const query=(document.getElementById('search-input')?.value||'').toLowerCase().trim();
  const fromVal=document.getElementById('filter-from')?.value;
  const toVal=document.getElementById('filter-to')?.value;
  const fromTs=fromVal ? new Date(fromVal).setHours(0,0,0,0) : null;
  const toTs=toVal ? new Date(toVal).setHours(23,59,59,999) : null;
  return S.videos.filter(v=>{
    if(query && !v.name.toLowerCase().includes(query) && !v.channel.toLowerCase().includes(query)) return false;
    if(fromTs||toTs){ const times=[v.createdAt,...v.logs.map(l=>l.ts)].filter(Boolean); const inRange=times.some(t=>{ if(fromTs&&t<fromTs) return false; if(toTs&&t>toTs) return false; return true; }); if(!inRange) return false; }
    return true;
  });
}

function renderStats() {
  const c=document.getElementById('stats-row'); if(!c) return;
  const running=S.videos.filter(v=>v.status==='running').length;
  const done=S.videos.filter(v=>v.status==='done').length;
  const total=S.videos.reduce((s,v)=>s+liveMs(v),0);
  c.innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Videos</div><div class="stat-val">${S.videos.length}</div></div>
    <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-val green">${running}</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val blue">${done}</div></div>
    <div class="stat-card"><div class="stat-label">Time Logged</div><div class="stat-val small amber">${fmtMs(total)}</div></div>`;
}

function renderVideos() {
  const c=document.getElementById('videos-list'); if(!c) return;
  const allVids=getFilteredVideos();
  const vids=[...allVids].sort((a,b)=>({running:0,paused:1,done:2}[a.status]-{running:0,paused:1,done:2}[b.status]));
  const fr=document.getElementById('filter-results');
  if(fr){ const q=(document.getElementById('search-input')?.value||'').trim(); const ff=document.getElementById('filter-from')?.value; const ft=document.getElementById('filter-to')?.value; if(q||ff||ft){ fr.innerHTML=`<strong>${vids.length}</strong> result${vids.length!==1?'s':''} found`; } else { fr.innerHTML=''; } }
  if(!vids.length){
    const q=(document.getElementById('search-input')?.value||'').trim(); const ff=document.getElementById('filter-from')?.value; const ft=document.getElementById('filter-to')?.value;
    if(q||ff||ft){ c.innerHTML='<div class="empty-state"><div class="empty-icon">🔍</div>No videos found.<br>Try a different search term or date range.</div>'; }
    else { c.innerHTML='<div class="empty-state"><div class="empty-icon">🎬</div>No videos yet.<br>Click "+ Add Video" to get started.</div>'; }
    return;
  }
  c.innerHTML=vids.map(v=>{
    const ms=liveMs(v),iR=v.status==='running',iD=v.status==='done';
    const badge=iR?`<span class="status-badge running"><span class="status-dot pulse"></span>Running</span>`:iD?`<span class="status-badge done"><span class="status-dot"></span>Completed</span>`:`<span class="status-badge paused"><span class="status-dot"></span>Paused</span>`;
    const exportBtn=`<button class="btn-ghost btn-sm" onclick="downloadLog('${v.id}')" style="margin-left:auto">⬇ Export Log</button>`;
    const commentBtn=`<button class="btn-ghost btn-sm" id="comment-btn-${v.id}" onclick="toggleComment('${v.id}')" style="display:inline-flex;align-items:center;gap:5px">💬 ${v.comment?'Comment':'Add Comment'}<span id="comment-dot-${v.id}" style="display:${v.comment?'inline-block':'none'};width:6px;height:6px;border-radius:50%;background:var(--accent);"></span></button>`;
    const actions=iD?`<button class="btn-ghost btn-sm" onclick="deleteVideo('${v.id}')">Delete Record</button>${commentBtn}${exportBtn}`:iR?`<button class="btn-amber btn-sm" onclick="lunchBreak('${v.id}')">🍽 Lunch Break</button><button class="btn-red btn-sm" onclick="pauseVideo('${v.id}')">⏸ Pause</button><button class="btn-green btn-sm" onclick="completeVideo('${v.id}')">✓ Mark Complete</button>${commentBtn}${exportBtn}`:`<button class="btn-primary btn-sm" onclick="startVideo('${v.id}')">▶ Resume Editing</button><button class="btn-green btn-sm" onclick="completeVideo('${v.id}')">✓ Mark Complete</button><button class="btn-ghost btn-sm" onclick="deleteVideo('${v.id}')">Delete</button>${commentBtn}${exportBtn}`;
    const logHtml=v.logs.slice().reverse().map(l=>`<div class="log-entry ${l.type}">${fmtDT(l.ts)} &nbsp;—&nbsp; ${l.note}${l.elapsed?' &nbsp;<strong>('+fmtMs(l.elapsed)+')</strong>':''}</div>`).join('');
    const commentBoxHtml=`<div class="comment-section">
      <div class="comment-box-wrap" id="comment-wrap-${v.id}">
        <textarea class="comment-textarea" id="comment-ta-${v.id}" rows="3" maxlength="500" placeholder="Add a note about this video — revision feedback, client instructions, anything you want the admin to see..." oninput="commentInput('${v.id}')">${v.comment||''}</textarea>
        <div class="comment-footer">
          <div style="display:flex;align-items:center;gap:10px">
            <span class="comment-char-count" id="comment-cc-${v.id}">${(v.comment||'').length} / 500 chars</span>
            <span class="comment-saved-note" id="comment-saved-${v.id}">✓ Saved</span>
          </div>
          <button class="comment-save-btn" onclick="saveComment('${v.id}')">Save Note</button>
        </div>
      </div>
    </div>`;
    return `<div class="video-card ${iR?'running':''}">
      <div class="card-body"><div class="card-top">
        <div><div class="video-name">${v.name}</div><span class="channel-badge">${v.channel}</span><div style="margin-top:6px">${badge}</div></div>
        <div class="timer-block"><div class="timer ${iR?'running-color':''}" id="t-${v.id}">${fmtMs(ms)}</div><div class="timer-meta">Started: ${v.logs.length?fmtDT(v.logs[0].ts):'—'}${iD?'<br>Completed: '+fmtDT(v.completedAt):''}</div></div>
      </div></div>
      <div class="card-actions">${actions}</div>
      ${commentBoxHtml}
      ${v.logs.length?`<div class="log-section"><span class="log-toggle" onclick="toggleLog('${v.id}')">▸ Activity Log (${v.logs.length} entries)</span><div class="log-entries" id="log-${v.id}" style="display:none">${logHtml}</div></div>`:''}
    </div>`;
  }).join('');
  vids.filter(v=>v.status==='running').forEach(v=>{ if(!S.ticks[v.id]) S.ticks[v.id]=setInterval(()=>tickTimer(v.id),1000); });
}

// ── Mini Popup Window ──
const _popupWindows = {};
const _popupBlobURLs = {};

// Called by buttons INSIDE the popup via postMessage
window.addEventListener('message', function(e) {
  const d = e.data;
  if (!d || d.type !== 'popup-action') return;
  const { vid, action } = d;
  if (action === 'start') startVideo(vid);
  if (action === 'pause') pauseVideo(vid);
  if (action === 'lunch') lunchBreak(vid);
});

// After any state change, push updated state to all open popups
function notifyPopups() {
  Object.keys(_popupWindows).forEach(vid => {
    const pw = _popupWindows[vid];
    if (!pw || pw.closed) { delete _popupWindows[vid]; return; }
    const v = S.videos.find(x => x.id === vid);
    if (!v) return;
    pw.postMessage({ type: 'state-update', video: JSON.parse(JSON.stringify(v)) }, '*');
  });
}

function openMiniPopup(vid) {
  // If already open, just focus it
  if (_popupWindows[vid] && !_popupWindows[vid].closed) {
    _popupWindows[vid].focus();
    return;
  }

  const v = S.videos.find(x => x.id === vid);
  if (!v) return;

  const html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>${v.name.replace(/"/g,'&quot;')} — Timer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0e0f11;color:#f0f0ee;display:flex;flex-direction:column;justify-content:center;padding:14px 18px;height:100vh;overflow:hidden;user-select:none}
.toprow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
.vname{font-size:12px;font-weight:700;color:#f0f0ee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
.row2{display:flex;align-items:center;gap:6px;margin-top:4px}
.ch{font-size:10px;color:#6b7280;background:#1e2128;padding:2px 8px;border-radius:4px}
.st{font-size:10px;font-weight:700}
.timer{font-family:'Courier New',monospace;font-size:34px;font-weight:700;letter-spacing:.04em;margin-bottom:12px;line-height:1}
.btns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button{border-radius:8px;padding:7px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;border:none;transition:opacity .15s}
button:hover{opacity:.85}
.btn-resume{background:#4f8ef7;color:#fff}
.btn-pause{background:rgba(245,166,35,.2);color:#f5a623;border:1px solid rgba(245,166,35,.35)!important}
.btn-lunch{background:rgba(245,166,35,.12);color:#f5a623;border:1px solid rgba(245,166,35,.2)!important;padding:7px 12px;font-size:12px}
.btn-close{background:none;border:none!important;color:#6b7280;font-size:18px;cursor:pointer;padding:2px 5px;border-radius:4px;line-height:1;flex-shrink:0}
.btn-close:hover{color:#e05c5c;background:rgba(224,92,92,.15)}
</style></head>
<body>
<div class="toprow">
  <div>
    <div class="vname" id="vname"></div>
    <div class="row2"><span class="ch" id="ch"></span><span class="st" id="st"></span></div>
  </div>
  <button class="btn-close" onclick="window.close()">✕</button>
</div>
<div class="timer" id="tmr">00:00</div>
<div class="btns" id="btns"></div>
<script>
  const VID = ${JSON.stringify(vid)};
  let state = ${JSON.stringify({
    name: v.name,
    channel: v.channel,
    status: v.status,
    totalMs: v.totalMs || 0,
    sessionStart: v.sessionStart || null
  })};

  function fmt(ms) {
    if(ms<0) ms=0;
    const hh=Math.floor(ms/3600000), mm=Math.floor((ms%3600000)/60000), ss=Math.floor((ms%60000)/1000);
    return (hh>0?String(hh).padStart(2,'0')+':':'')+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  }

  function act(action) {
    window.opener && window.opener.postMessage({type:'popup-action', vid:VID, action}, '*');
  }

  function render() {
    const isR = state.status==='running', isD = state.status==='done';
    const color = isR?'#3ecf8e':isD?'#4f8ef7':'#f5a623';
    document.getElementById('vname').textContent = state.name;
    document.getElementById('ch').textContent = state.channel;
    const stEl = document.getElementById('st');
    stEl.textContent = isR?'● Recording':isD?'✓ Done':'⏸ Paused';
    stEl.style.color = color;
    document.getElementById('tmr').style.color = color;
    const btns = document.getElementById('btns');
    if(isD) { btns.innerHTML='<span style="font-size:12px;color:#4f8ef7">✓ Completed</span>'; return; }
    btns.innerHTML = (isR
      ? '<button class="btn-pause" onclick="act(\'pause\')">⏸ Pause</button><button class="btn-lunch" onclick="act(\'lunch\')">🍽 Lunch</button>'
      : '<button class="btn-resume" onclick="act(\'start\')">▶ Resume</button>');
  }

  function tick() {
    const isR = state.status==='running';
    const ms = (isR && state.sessionStart) ? state.totalMs + (Date.now()-state.sessionStart) : state.totalMs;
    document.getElementById('tmr').textContent = fmt(ms);
  }

  // Listen for state updates from parent
  window.addEventListener('message', function(e) {
    if(e.data && e.data.type==='state-update' && e.data.video) {
      state = e.data.video;
      render();
    }
  });

  render();
  setInterval(tick, 500);
<\/script></body></html>`;

  // Use blob URL so it works with file:// protocol too
  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  if (_popupBlobURLs[vid]) URL.revokeObjectURL(_popupBlobURLs[vid]);
  _popupBlobURLs[vid] = url;

  const pw = window.open(url, 'miniTimer_' + vid,
    'width=390,height=140,resizable=yes,scrollbars=no,toolbar=no,menubar=no,location=no,status=no,top=40,left=40'
  );

  if (!pw) {
    alert('Popup blocked!\n\nClick the blocked popup icon in your browser address bar and select "Always allow popups from this site".\n\nThen click 📺 Pop Out again.');
    URL.revokeObjectURL(url);
    return;
  }
  _popupWindows[vid] = pw;
}

// ── Init ──
initAppAuth();
</script>
</body>
